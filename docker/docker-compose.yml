version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: ai-code-review-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: your_password_here
      POSTGRES_DB: ai_code_review
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ai-code-review-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ai-code-review-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - ai-code-review-network

  qdrant:
    image: qdrant/qdrant:latest
    container_name: ai-code-review-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - ai-code-review-network

  backend:
    build:
      context: ../server
      dockerfile: Dockerfile
    container_name: ai-code-review-backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:your_password_here@postgres:5432/ai_code_review
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ai-code-review-secret-key-change-in-production
      DASHSCOPE_API_KEY: sk-aea63deef02e4aa189b3fec8ff5ce3fe
      GITHUB_TOKEN: ${GITHUB_TOKEN}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - ai-code-review-network

volumes:
  postgres_data:
  redis_data:
  qdrant_data:

networks:
  ai-code-review-network:
    driver: bridge
