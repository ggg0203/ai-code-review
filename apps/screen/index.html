<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Code Review — 平台数据 3D 大屏</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { background: #0a0a1a; overflow: hidden; font-family: "Microsoft YaHei", "PingFang SC", sans-serif; }

      /* ====== 顶部标题栏 ====== */
      #header {
        position: fixed; top: 0; left: 0; right: 0; z-index: 10;
        padding: 16px 32px;
        display: flex; justify-content: space-between; align-items: center;
        background: linear-gradient(180deg, rgba(10,10,26,0.95) 60%, transparent);
        pointer-events: none;
      }
      #header h1 {
        font-size: 24px; font-weight: 700; color: #fff;
        text-shadow: 0 0 20px rgba(68,136,255,0.5);
        letter-spacing: 2px;
      }
      #header .live {
        display: flex; align-items: center; gap: 8px;
        font-size: 13px; color: #44cc88;
      }
      #header .live-dot {
        width: 8px; height: 8px; border-radius: 50%;
        background: #44cc88; box-shadow: 0 0 8px #44cc88;
        animation: pulse 1.5s ease-in-out infinite;
      }
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.3; }
      }

      /* ====== 左侧统计面板 ====== */
      #stats {
        position: fixed; top: 100px; left: 32px; z-index: 10;
        display: flex; flex-direction: column; gap: 16px;
        pointer-events: none;
      }
      .stat-card {
        background: rgba(16,16,36,0.85);
        border: 1px solid rgba(68,136,255,0.2);
        border-radius: 12px; padding: 16px 24px;
        backdrop-filter: blur(10px);
        min-width: 180px;
        pointer-events: auto;
        transition: border-color 0.3s;
      }
      .stat-card:hover { border-color: rgba(68,136,255,0.5); }
      .stat-label {
        font-size: 12px; color: #8899bb; text-transform: uppercase;
        letter-spacing: 1px; margin-bottom: 4px;
      }
      .stat-value {
        font-size: 32px; font-weight: 700; color: #fff;
        font-variant-numeric: tabular-nums;
      }
      .stat-sub {
        font-size: 12px; color: #556688; margin-top: 4px;
      }

      /* ====== 右侧图例 ====== */
      #legend {
        position: fixed; top: 100px; right: 32px; z-index: 10;
        display: flex; flex-direction: column; gap: 8px;
        pointer-events: none;
      }
      .legend-item {
        display: flex; align-items: center; gap: 10px;
        font-size: 13px; color: #aabbcc;
      }
      .legend-dot {
        width: 10px; height: 10px; border-radius: 50%;
        box-shadow: 0 0 6px currentColor;
      }

      /* ====== 底部提示 ====== */
      #footer {
        position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); z-index: 10;
        font-size: 12px; color: #445566;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <!-- 顶部 -->
    <div id="header">
      <h1>AI CODE REVIEW · 数据大屏</h1>
      <div class="live"><span class="live-dot"></span>实时</div>
    </div>

    <!-- 左侧统计卡片 (JS 动态填充) -->
    <div id="stats">
      <div class="stat-card">
        <div class="stat-label">活跃项目</div>
        <div class="stat-value" id="val-projects">—</div>
        <div class="stat-sub" id="sub-projects"></div>
      </div>
      <div class="stat-card">
        <div class="stat-label">审查记录</div>
        <div class="stat-value" id="val-reviews">—</div>
        <div class="stat-sub" id="sub-reviews"></div>
      </div>
      <div class="stat-card">
        <div class="stat-label">平均评分</div>
        <div class="stat-value" id="val-score">—</div>
        <div class="stat-sub">AI 综合评分</div>
      </div>
    </div>

    <!-- 右侧图例 -->
    <div id="legend">
      <div class="legend-item"><span class="legend-dot" style="background:#44cc88"></span>项目节点</div>
      <div class="legend-item"><span class="legend-dot" style="background:#4488ff"></span>审查记录</div>
      <div class="legend-item"><span class="legend-dot" style="background:#cc8844"></span>活跃依赖</div>
    </div>

    <!-- 底部 -->
    <div id="footer">拖拽旋转 · 滚轮缩放 · 右键平移</div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
