name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ===== Python 后端语法检查 =====
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check Python syntax
        run: |
          python -m py_compile main.py
          python -m py_compile app/core/config.py
          python -m py_compile app/core/database.py
          python -m py_compile app/core/security.py
          python -m py_compile app/core/cache.py
          python -m py_compile app/models/user.py
          python -m py_compile app/models/project.py
          python -m py_compile app/models/review.py
          python -m py_compile app/api/auth.py
          python -m py_compile app/api/projects.py
          python -m py_compile app/api/reviews.py
          python -m py_compile app/api/ai.py
          python -m py_compile app/api/rag.py
          python -m py_compile app/api/stats.py
          python -m py_compile app/ai/reviewer.py
          python -m py_compile app/ai/rag.py
          echo "✅ All Python files pass syntax check"

  # ===== Web 前端 TypeScript 检查 =====
  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install

      - name: TypeScript type check
        run: npx tsc --noEmit

  # ===== 3D 大屏 TypeScript 检查 =====
  screen:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/screen
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install

      - name: TypeScript type check
        run: npx tsc --noEmit

  # ===== 部署通知 =====
  # 说明：ECS (47.76.141.204) 外部 SSH 不通，已改用服务器端 cron 自动拉取部署
  # 服务器上配置了 /opt/auto-deploy.sh，每分钟检查 Git 更新并自动 docker compose up -d --build
  # 此步骤仅标记 CI 通过，实际部署由 ECS 上的 cron 任务自动完成
  deploy:
    needs: [backend, web, screen]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: CI Passed - ECS Auto Deploy
        run: |
          echo "✅ 所有 CI 检查通过"
          echo "📦 部署方式: ECS cron 自动拉取 (每分钟检查更新)"
          echo "📍 目标服务器: 47.76.141.204"
          echo "🕐 预计生效时间: 1-2 分钟"
